<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Closing Report</title>
    <style>
        @page {
            margin: 0;
            size: 80mm auto; /* Force 80mm width for PDF generation */
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 11px; /* Requested size 11px */
            font-weight: bold;
            color: #000;
            margin: 0;
            padding: 5px 6mm; /* Minimal margins with padding matching receipt */
            width: 70mm; /* Force 70mm width to prevent stretching */
            box-sizing: border-box;
            overflow: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 5px;
        }
        .header h1 {
            font-size: 14px;
            margin: 0 0 2px 0;
            text-transform: uppercase;
        }
        .header p {
            margin: 1px 0;
        }
        .separator {
            border-top: 1px dashed #000;
            margin: 4px 0;
        }
        .section-header {
            text-align: center;
            font-size: 13px;
            margin: 8px 0 4px 0;
            text-transform: uppercase;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            border-bottom: 1px dashed #000;
            padding-bottom: 2px;
            font-size: 11px;
        }
        td {
            padding: 2px 0;
            vertical-align: top;
            word-wrap: break-word;
        }
        .label {
            text-align: left;
        }
        .value {
            text-align: right;
        }
        .total-row {
            font-weight: 900;
            font-size: 13px;
            margin-top: 4px;
            border-top: 1px dashed #000;
            padding-top: 4px;
        }
        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 10px;
        }
        /* Cashier breakdown styling */
        .cashier-block {
            margin-bottom: 8px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 4px;
        }
        .cashier-name {
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 1px dashed #000;
            margin-bottom: 2px;
        }
        .cashier-row {
            display: flex;
            justify-content: space-between;
        }

        /* Flex rows for totals */
        .flex-row {
            display: flex;
            justify-content: space-between;
            margin: 2px 0;
        }

    </style>
</head>
<body>
    <div class="header">
        <h1>{{businessName}}</h1>
        <p>{{businessAddress}}</p>
        <p>Tel: {{businessPhone}}</p>
    </div>

    <div class="separator"></div>

    <div class="header">
        <h2 style="font-size: 14px; margin: 4px 0;">DAILY SALES REPORT</h2>
        <p>{{date}}</p>
    </div>

    {{itemSalesSection}}

    <div class="separator"></div>

    <div class="section-header">
        CASHIER SUMMARY
    </div>

    <div class="separator"></div>

    <div class="cashier-section">
        {{cashierBreakdown}}
    </div>

    <div class="separator"></div>

    <div class="section-header">
        GRAND TOTALS
    </div>

    <div class="separator"></div>

    <div class="flex-row">
        <span>Total Cash:</span>
        <span>{{totalCash}}</span>
    </div>
    <div class="flex-row">
        <span>Total M-Pesa:</span>
        <span>{{totalMpesa}}</span>
    </div>
    <div class="flex-row">
        <span>Total Credit:</span>
        <span>{{totalCredit}}</span>
    </div>

    <div class="separator"></div>

    <div class="flex-row total-row">
        <span>GRAND TOTAL:</span>
        <span>{{grandTotal}}</span>
    </div>

    <div class="separator"></div>

    <div class="footer">
        <p>End of Day Report</p>
    </div>
</body>
</html>
